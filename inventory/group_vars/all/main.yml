---
ansible_user: root
ansible_python_interpreter: /usr/bin/python3

# Domain
lab_domain: local.lan

# Harbor
harbor_hostname: harbor.local.lan
harbor_metrics_port: 8090

# Timezone
timezone: Europe/Amsterdam

# Packages to remove across all hosts
common_remove_packages:
  - cockpit

# Centralized version management
# Single source of truth for all component versions.
# Update here to bump versions across the entire project.

# Platform
harbor_version: "v2.11.0"

# Monitoring stack
grafana_version: "11.6.0"
prometheus_version: "v3.3.0"
alertmanager_version: "v0.28.1"
node_exporter_version: "1.12.1"
pushgateway_version: "v1.11.0"

# ELK stack
elasticsearch_version: "8.17.0"
logstash_version: "8.17.0"
kibana_version: "8.17.0"
elasticsearch_exporter_version: "v1.11.0"
elk_elasticsearch_exporter_port: 9114

# Base images
alpine_version: "3.21"
ubuntu_version: "24.04"
busybox_version: "1.37"
nginx_version: "1.27-alpine"
redis_version: "7.4-alpine"
postgres_version: "17-alpine"
mariadb_version: "11.8"
python_version: "3.13-slim"
node_version: "22-alpine"
golang_version: "1.24-alpine"

# mTLS certificate paths (shared between node_exporter and monitoring roles)
node_exporter_cert_dir: /etc/pki/tls/certs
node_exporter_key_dir: /etc/pki/tls/private
node_exporter_ca_cert: "{{ node_exporter_cert_dir }}/monitoring-ca.crt"
node_exporter_server_cert: "{{ node_exporter_cert_dir }}/node-exporter.crt"
node_exporter_server_key: "{{ node_exporter_key_dir }}/node-exporter.key"

# Certificates to generate on each host (processed by certificates role)
# Additional certs are appended by group_vars (monitoring, etc.)
certificates_extra_sans: []
certificates:
  - name: "{{ vm_hostname }}"
    type: selfsigned
    extra_sans: "{{ certificates_extra_sans }}"

# Firewall
firewall_podman_interfaces:
  - podman1
  - cni-podman0

# Controller /etc/hosts entries
controller_hosts_entries:
  - "192.168.100.10 ansible01 harbor.local.lan"
  - "192.168.100.11 ansible02 monitoring.local.lan"
  - "192.168.100.12 ansible03 observability.local.lan"
