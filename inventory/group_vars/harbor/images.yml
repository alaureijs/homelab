---
# Container images to sync to Harbor
# Versions are defined in group_vars/all/main.yml

harbor_sync_images:
  # Base images
  - name: library/alpine
    tags:
      - "{{ alpine_version }}"
    registry: docker.io

  - name: library/ubuntu
    tags:
      - "{{ ubuntu_version }}"
    registry: docker.io

  - name: library/busybox
    tags:
      - "{{ busybox_version }}"
    registry: docker.io

  # Application images
  - name: library/nginx
    tags:
      - "{{ nginx_version }}"
    registry: docker.io

  - name: library/redis
    tags:
      - "{{ redis_version }}"
    registry: docker.io

  - name: library/postgres
    tags:
      - "{{ postgres_version }}"
    registry: docker.io

  - name: library/mariadb
    tags:
      - "{{ mariadb_version }}"
    registry: docker.io

  - name: library/python
    tags:
      - "{{ python_version }}"
    registry: docker.io

  - name: library/node
    tags:
      - "{{ node_version }}"
    registry: docker.io

  - name: library/golang
    tags:
      - "{{ golang_version }}"
    registry: docker.io

  # Monitoring stack
  - name: prometheus/prometheus
    tags:
      - "{{ prometheus_version }}"
    registry: quay.io

  - name: prometheus/alertmanager
    tags:
      - "{{ alertmanager_version }}"
    registry: quay.io

  - name: grafana/grafana
    tags:
      - "{{ grafana_version }}"
    registry: docker.io

  - name: prometheus/node-exporter
    tags:
      - "{{ node_exporter_version }}"
    registry: quay.io

  - name: prometheus/pushgateway
    tags:
      - "{{ pushgateway_version }}"
    registry: quay.io

  # ELK stack
  - name: library/elasticsearch
    tags:
      - "{{ elasticsearch_version }}"
    registry: docker.io

  - name: library/logstash
    tags:
      - "{{ logstash_version }}"
    registry: docker.io

  - name: library/kibana
    tags:
      - "{{ kibana_version }}"
    registry: docker.io

  # Exporters
  - name: prometheuscommunity/elasticsearch-exporter
    tags:
      - "{{ elasticsearch_exporter_version }}"
    registry: docker.io

  # Harbor exporter
  - name: goharbor/harbor-exporter
    tags:
      - "{{ harbor_version }}"
    registry: docker.io

# Registry URL to proxy-cache project mapping
harbor_config_proxy_projects:
  docker.io: docker-hub-cache
  quay.io: quay-cache
  ghcr.io: ghcr-cache

# Registry name to URL mapping (used by harbor_config role)
harbor_config_registry_map:
  docker-hub: docker.io
  quay: quay.io
  ghcr: ghcr.io
