---
# Harbor configuration (harbor_version from group_vars/all/versions.yml)

harbor_hostname: harbor.local.lan
harbor_tls_enabled: true
harbor_enable_trivy: true
harbor_enable_chartmuseum: false

# Paths
harbor_install_dir: /opt/harbor
harbor_data_dir: /data/harbor
harbor_tls_cert_path: "/etc/pki/tls/certs/harbor.crt"
harbor_tls_key_path: "/etc/pki/tls/private/harbor.key"

# Ports
harbor_http_port: 80
harbor_https_port: 443
harbor_internal_port: 4443

# Passwords (from vault)
harbor_admin_password: "{{ vault_harbor_admin_password }}"
harbor_database_password: "{{ vault_harbor_database_password }}"
harbor_redis_password: "{{ vault_harbor_redis_password }}"

# Storage
harbor_storage_filesystem_rootdirectory: /data/harbor/storage

# Firewall
firewall_ports:
  - 80/tcp
  - 443/tcp
  - 22/tcp

# Certificate SANs
certificates_extra_sans:
  - "DNS:{{ harbor_hostname }}"

# Hosts entries
hosts_entries:
  - "192.168.100.10 harbor.local.lan"

# Users and roles (role IDs: 1=projectAdmin, 2=developer, 3=guest, 4=maintainer, 5=limitedGuest)
# Note: system admin (user_id=1) is created during Harbor install, not managed here
harbor_config_users:
  - username: viewer
    password: "{{ vault_harbor_viewer_password }}"
    realname: "Viewer Account"
    email: viewer@local.lan
    roles:
      - project_name: library
        role_id: 3

  - username: ansible-config
    password: "{{ vault_harbor_config_password }}"
    realname: "Ansible Config"
    email: ansible-config@local.lan
    roles:
      - project_name: library
        role_id: 1
      - project_name: prometheus
        role_id: 1
      - project_name: docker-hub-cache
        role_id: 1
      - project_name: quay-cache
        role_id: 1
      - project_name: ghcr-cache
        role_id: 1

  - username: ansible-sync
    password: "{{ vault_harbor_sync_password }}"
    realname: "Ansible Sync"
    email: ansible-sync@local.lan
    roles:
      - project_name: library
        role_id: 2
      - project_name: prometheus
        role_id: 2
      - project_name: docker-hub-cache
        role_id: 2
      - project_name: quay-cache
        role_id: 2
      - project_name: ghcr-cache
        role_id: 2

# Projects
harbor_config_projects: []
harbor_config_sync_projects: true

# Upstream container registries (proxy cache sources)
harbor_config_registries:
  - name: docker-hub
    url: https://hub.docker.com
    type: docker-hub
  - name: quay
    url: https://quay.io
    type: quay
  - name: ghcr
    url: https://ghcr.io
    type: github-ghcr
