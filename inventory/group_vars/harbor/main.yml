---
# Harbor configuration

harbor_version: "v2.11.0"
harbor_hostname: harbor.local.lan
harbor_tls_enabled: true
harbor_enable_trivy: false
harbor_enable_chartmuseum: false

# Paths
harbor_install_dir: /opt/harbor
harbor_data_dir: /data/harbor
harbor_tls_cert_path: "/etc/pki/tls/certs/harbor.crt"
harbor_tls_key_path: "/etc/pki/tls/private/harbor.key"

# Ports
harbor_http_port: 80
harbor_https_port: 443
harbor_internal_port: 4443

# Passwords (from vault)
harbor_admin_password: "{{ vault_harbor_admin_password }}"
harbor_database_password: "{{ vault_harbor_database_password }}"
harbor_redis_password: "{{ vault_harbor_redis_password }}"

# Storage
harbor_storage_filesystem_rootdirectory: /data/harbor/storage

# Firewall
firewall_ports:
  - 80/tcp
  - 443/tcp
  - 22/tcp

# Hosts entries
hosts_entries:
  - "192.168.100.10 harbor.local.lan"

# Users and roles (role IDs: 1=projectAdmin, 2=developer, 3=guest, 4=maintainer, 5=limitedGuest)
# Note: system admin (user_id=1) is created during Harbor install, not managed here
harbor_config_users:
  - username: viewer
    password: "{{ vault_harbor_viewer_password }}"
    realname: "Viewer Account"
    email: viewer@local.lan
    roles:
      - project_name: proxy-cache
        role_id: 3
      - project_name: library
        role_id: 3

# Projects
harbor_config_projects:
  - name: proxy-cache
    public: false
