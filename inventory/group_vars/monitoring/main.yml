---
# Certificate SANs
certificates_extra_sans:
  - "DNS:monitoring.local.lan"

# Monitoring stack
monitoring_hostname: monitoring.local.lan
monitoring_data_dir: /var/lib/monitoring
monitoring_config_dir: /etc/monitoring

# Container images (from Harbor, versions from group_vars/all/versions.yml)
monitoring_grafana_image: "{{ harbor_hostname }}/library/grafana/grafana:{{ grafana_version }}"
monitoring_prometheus_image: "{{ harbor_hostname }}/prometheus/prometheus/prometheus:{{ prometheus_version }}"
monitoring_alertmanager_image: "{{ harbor_hostname }}/prometheus/prometheus/alertmanager:{{ alertmanager_version }}"

# Grafana
monitoring_grafana_admin_password: "{{ vault_monitoring_grafana_password }}"

# Prometheus
monitoring_prometheus_retention: "30d"
monitoring_prometheus_retention_size: "2GB"
monitoring_prometheus_scrape_interval: "15s"
monitoring_prometheus_evaluation_interval: "15s"

# Reverse proxy
monitoring_nginx_cert_path: "/etc/pki/tls/certs/{{ vm_hostname }}.crt"
monitoring_nginx_key_path: "/etc/pki/tls/private/{{ vm_hostname }}.key"

# mTLS directory
monitoring_mtls_dir: /etc/prometheus/mtls
monitoring_mtls_ca_cert: "{{ monitoring_mtls_dir }}/ca.crt"
monitoring_mtls_client_cert: "{{ monitoring_mtls_dir }}/client.crt"
monitoring_mtls_client_key: "{{ monitoring_mtls_dir }}/client.key"

# mTLS certificate renewal
monitoring_cert_renew_threshold_days: 30
monitoring_cert_force_renewal: false

# Node-exporter server cert SANs (built from inventory)
monitoring_ne_dns_sans: "{{ groups['all'] | map('extract', hostvars, 'vm_hostname') | map('regex_replace', '^(.*)$', 'DNS:\\1.' + lab_domain) | list }}"
monitoring_ne_ip_sans: "{{ groups['all'] | map('extract', hostvars, 'ansible_host') | map('regex_replace', '^(.*)$', 'IP:\\1') | list }}"
monitoring_ne_server_sans: >-
  {{ ['DNS:' + vm_hostname + '.' + lab_domain]
     + monitoring_ne_dns_sans
     + monitoring_ne_ip_sans }}

# Certificates to generate on this host (extends group_vars/all)
certificates:
  - name: "{{ vm_hostname }}"
    type: selfsigned
    extra_sans: "{{ certificates_extra_sans }}"
  - name: ca
    type: ca
    dir: /etc/prometheus/mtls
    key_dir: /etc/prometheus/mtls
    subject:
      CN: "Monitoring CA"
      O: "Lab"
    days: 3650
    force: "{{ monitoring_cert_force_renewal }}"
  - name: node-exporter
    type: ownca
    ca_cert: "{{ monitoring_mtls_ca_cert }}"
    ca_key: "{{ monitoring_mtls_dir }}/ca.key"
    extra_sans: "{{ monitoring_ne_server_sans }}"
    force: "{{ monitoring_cert_force_renewal }}"
  - name: client
    type: ownca
    ca_cert: "{{ monitoring_mtls_ca_cert }}"
    ca_key: "{{ monitoring_mtls_dir }}/ca.key"
    client: true
    dir: /etc/prometheus/mtls
    key_dir: /etc/prometheus/mtls
    force: "{{ monitoring_cert_force_renewal }}"
