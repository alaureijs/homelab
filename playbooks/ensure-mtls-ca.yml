---
- name: Ensure mTLS CA exists on controller
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    ca_dir: "{{ playbook_dir }}/../files/certificates"
    ca_cert: "{{ ca_dir }}/mtls-ca.crt"
    ca_key: "{{ ca_dir }}/mtls-ca.key"

  tasks:
    - name: Ensure files/certificates directory exists
      ansible.builtin.file:
        path: "{{ ca_dir }}"
        state: directory
        mode: "0755"

    - name: Check if CA cert already exists
      ansible.builtin.stat:
        path: "{{ ca_cert }}"
      register: ca_cert_stat

    - name: Generate mTLS CA private key
      community.crypto.openssl_privatekey:
        path: "{{ ca_key }}"
        size: 4096
        mode: "0600"
      register: ca_key_gen
      when: not ca_cert_stat.stat.exists

    - name: Generate mTLS CA CSR
      community.crypto.openssl_csr:
        path: /tmp/mtls-ca.csr
        privatekey_path: "{{ ca_key }}"
        common_name: "mTLS CA"
        organization_name: "Lab"
        basic_constraints:
          - "CA:TRUE"
          - "pathlen:0"
        key_usage:
          - keyCertSign
          - cRLSign
      when: ca_key_gen is changed

    - name: Generate mTLS CA certificate
      community.crypto.x509_certificate:
        path: "{{ ca_cert }}"
        privatekey_path: "{{ ca_key }}"
        csr_path: /tmp/mtls-ca.csr
        provider: selfsigned
        selfsigned_not_after: "+3650d"
        mode: "0644"
      when: ca_key_gen is changed

    - name: Remove CSR
      ansible.builtin.file:
        path: /tmp/mtls-ca.csr
        state: absent
      when: ca_key_gen is changed

    - name: Encrypt CA key with ansible-vault
      ansible.builtin.command: ansible-vault encrypt "{{ ca_key }}"
      changed_when: true
      when: ca_key_gen is changed

    - name: Show CA info
      ansible.builtin.debug:
        msg: "mTLS CA: {{ ca_cert }}"

- name: Copy mTLS CA to all hosts
  hosts: all
  become: true
  gather_facts: false

  vars:
    ca_dir: "{{ playbook_dir }}/../files/certificates"
    ca_cert: "{{ ca_dir }}/mtls-ca.crt"
    ca_key: "{{ ca_dir }}/mtls-ca.key"
    vault_password_local: "{{ playbook_dir }}/../.vault_password"

  tasks:
    - name: Ensure /etc/mtls directory exists
      ansible.builtin.file:
        path: /etc/mtls
        state: directory
        group: node_exporter
        mode: "0750"

    - name: Copy mTLS CA certificate
      ansible.builtin.copy:
        src: "{{ ca_cert }}"
        dest: /etc/mtls/ca.crt
        mode: "0644"

    - name: Read vault password from controller
      ansible.builtin.slurp:
        src: "{{ vault_password_local }}"
      delegate_to: localhost
      connection: local
      register: vault_password_content
      no_log: true

    - name: Write vault password to temp file
      ansible.builtin.copy:
        content: "{{ vault_password_content.content | b64decode }}"
        dest: /tmp/.vault_pw
        mode: "0600"
      delegate_to: localhost
      connection: local
      no_log: true

    - name: Decrypt mTLS CA key on controller
      ansible.builtin.command: >-
        ansible-vault view --vault-password-file /tmp/.vault_pw "{{ ca_key }}"
      delegate_to: localhost
      connection: local
      register: ca_key_plaintext
      changed_when: false
      no_log: true

    - name: Remove vault password temp file
      ansible.builtin.file:
        path: /tmp/.vault_pw
        state: absent
      delegate_to: localhost
      connection: local
      no_log: true

    - name: Write mTLS CA key to host
      ansible.builtin.copy:
        content: "{{ ca_key_plaintext.stdout }}"
        dest: /etc/mtls/ca.key
        mode: "0600"
      no_log: true
