---
- name: Provision ansible01 for Harbor
  hosts: ansible01
  become: true
  gather_facts: true

  tasks:
    - name: Set timezone
      community.general.timezone:
        name: "{{ timezone }}"

    - name: Install required packages
      ansible.builtin.dnf:
        name: "{{ packages }}"
        state: present

    - name: Ensure firewalld is running
      ansible.builtin.systemd:
        name: firewalld
        state: started
        enabled: true

    - name: Open required ports in firewalld
      ansible.posix.firewalld:
        port: "{{ item }}"
        permanent: true
        state: enabled
      loop: "{{ firewall_ports }}"

    - name: Reload firewalld
      ansible.builtin.systemd:
        name: firewalld
        state: reloaded

    - name: Add /etc/hosts entries
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ item }}"
        state: present
      loop: "{{ hosts_entries }}"

    - name: Set hostname
      ansible.builtin.hostname:
        name: "{{ vm_hostname }}"

    - name: Ensure chronyd is running
      ansible.builtin.systemd:
        name: chronyd
        state: started
        enabled: true
