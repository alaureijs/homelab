---
- name: Provision ansible01 for Harbor
  hosts: ansible01
  become: true
  gather_facts: true

  pre_tasks:
    - name: Set timezone
      community.general.timezone:
        name: "{{ timezone }}"

    - name: Install required packages
      ansible.builtin.dnf:
        name: "{{ packages }}"
        state: present

    - name: Add /etc/hosts entries
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ item }}"
        state: present
      loop: "{{ hosts_entries }}"

    - name: Set hostname
      ansible.builtin.hostname:
        name: "{{ vm_hostname }}"

    - name: Ensure chronyd is running
      ansible.builtin.systemd:
        name: chronyd
        state: started
        enabled: true

  roles:
    - role: firewall
    - role: podman
    - role: certificates
    - role: hardening
    - role: harbor
