---
# Play 0: Manage controller /etc/hosts
- name: Update controller hosts file
  hosts: localhost
  connection: local
  become: true
  gather_facts: false

  tasks:
    - name: Ensure /etc/hosts entries for all hosts
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ item }}"
        state: present
      loop: "{{ controller_hosts_entries }}"

# Play 1: Provision ansible01 for Harbor
- name: Provision ansible01 for Harbor
  hosts: ansible01
  become: true
  gather_facts: true

  pre_tasks:
    - name: Set timezone
      community.general.timezone:
        name: "{{ timezone }}"

    - name: Set hostname
      ansible.builtin.hostname:
        name: "{{ vm_hostname }}"

  roles:
    - role: common
    - role: firewall
    - role: podman
    - role: certificates
    - role: hardening
    - role: harbor
    - role: harbor_config
