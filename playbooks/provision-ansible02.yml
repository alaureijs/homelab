---
# Play 0: Manage controller /etc/hosts
- name: Update controller hosts file
  hosts: localhost
  connection: local
  become: true
  gather_facts: false

  tasks:
    - name: Ensure /etc/hosts entries for all hosts
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ item }}"
        state: present
      loop: "{{ controller_hosts_entries }}"

# Play 1: Ensure mTLS CA exists
- name: Ensure mTLS CA exists
  ansible.builtin.import_playbook: ensure-mtls-ca.yml

# Play 2: Install node-exporter on all hosts
- name: Provision all hosts
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Set timezone
      community.general.timezone:
        name: "{{ timezone }}"

    - name: Set hostname
      ansible.builtin.hostname:
        name: "{{ vm_hostname }}"

    - name: Merge certificates lists
      ansible.builtin.set_fact:
        certificates: "{{ certificates + certificates_extra | default([]) }}"

  roles:
    - role: common
    - role: firewall
    - role: certificates
    - role: podman
    - role: hardening
    - role: node_exporter

# Play 3: Deploy monitoring stack on monitoring host
- name: Deploy monitoring stack
  hosts: monitoring
  become: true
  gather_facts: true

  roles:
    - role: monitoring
