---
# certificates role defaults

certificates_dir: /etc/pki/tls/certs
certificates_key_dir: /etc/pki/tls/private

# Renew certificates when they expire within this many days
certificates_renew_threshold_days: 30

# List of certificates to generate on this host
# Each item is a dict with:
#   name        — filename prefix (without extension)
#   type        — selfsigned | ca | ownca
#   dir         — cert output dir (default: certificates_dir)
#   key_dir     — key output dir (default: certificates_key_dir)
#   subject     — dict with CN, O, etc. (selfsigned, ca)
#   ca_cert     — path to CA cert (ownca)
#   ca_key      — path to CA key (ownca)
#   extra_sans  — additional SANs list (ownca, selfsigned)
#   client      — if true, add clientAuth EKU (ownca)
#   days        — validity period (default: 3650)
#   force       — force renewal
#   subject_alt_name — full SANs list override (selfsigned)
certificates: []
