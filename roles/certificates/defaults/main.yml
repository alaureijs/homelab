---
# certificates role defaults

certificates_dir: /etc/pki/tls/certs
certificates_key_dir: /etc/pki/tls/private
certificates_name: harbor

# Set to true to generate self-signed certs, false to use provided ones
certificates_self_signed: true

# Self-signed certificate parameters
certificates_self_signed_days: 3650
certificates_self_signed_subject:
  C: "NL"
  ST: "Noord-Holland"
  L: "Amsterdam"
  O: "Lab"
  CN: "{{ vm_hostname }}"

# Provide existing cert/key content (used when certificates_self_signed: false)
# certificates_cert_content: ""
# certificates_key_content: ""
