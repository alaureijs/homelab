---
- name: Install cryptography dependency
  ansible.builtin.dnf:
    name: python3-cryptography
    state: present

- name: Ensure certificate directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ certificates_dir }}"
    - "{{ certificates_key_dir }}"

- name: Generate self-signed certificate
  when: certificates_self_signed | bool
  block:
    - name: Generate private key
      community.crypto.openssl_privatekey:
        path: "{{ certificates_key_dir }}/{{ certificates_name }}.key"
        size: 4096
        mode: "0600"

    - name: Generate CSR
      community.crypto.openssl_csr:
        path: "/tmp/{{ certificates_name }}.csr"
        privatekey_path: "{{ certificates_key_dir }}/{{ certificates_name }}.key"
        common_name: "{{ certificates_self_signed_subject.CN }}"
        organization_name: "{{ certificates_self_signed_subject.O }}"
        state_or_province_name: "{{ certificates_self_signed_subject.ST }}"
        locality_name: "{{ certificates_self_signed_subject.L }}"
        country_name: "{{ certificates_self_signed_subject.C }}"
        subject_alt_name: "{{ certificates_self_signed_subject_alt_name }}"

    - name: Generate self-signed certificate
      community.crypto.x509_certificate:
        path: "{{ certificates_dir }}/{{ certificates_name }}.crt"
        privatekey_path: "{{ certificates_key_dir }}/{{ certificates_name }}.key"
        csr_path: "/tmp/{{ certificates_name }}.csr"
        provider: selfsigned
        selfsigned_not_after: "+{{ certificates_self_signed_days }}d"
        mode: "0644"

    - name: Remove CSR
      ansible.builtin.file:
        path: "/tmp/{{ certificates_name }}.csr"
        state: absent

- name: Deploy provided certificate
  when: not certificates_self_signed | bool
  block:
    - name: Write certificate
      ansible.builtin.copy:
        content: "{{ certificates_cert_content }}"
        dest: "{{ certificates_dir }}/{{ certificates_name }}.crt"
        owner: root
        group: root
        mode: "0644"

    - name: Write private key
      ansible.builtin.copy:
        content: "{{ certificates_key_content }}"
        dest: "{{ certificates_key_dir }}/{{ certificates_name }}.key"
        owner: root
        group: root
        mode: "0600"
