---
- name: Install cryptography dependency
  ansible.builtin.dnf:
    name: python3-cryptography
    state: present

- name: Ensure certificate directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ certificates_dir }}"
    - "{{ certificates_key_dir }}"

- name: Generate certificates
  ansible.builtin.include_tasks: generate.yml
  loop: "{{ certificates }}"
  loop_control:
    loop_var: cert
    label: "{{ cert.type }}:{{ cert.name }}"
  when: certificates | length > 0
