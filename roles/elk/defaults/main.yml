---
# ELK stack role defaults

elk_hostname: observability.local.lan

# Paths
elk_config_dir: /etc/elk
elk_data_dir: /var/lib/elk
elk_cert_dir: /etc/pki/tls/certs
elk_key_dir: /etc/pki/tls/private

# Config file locations (override to change where config comes from)
elk_elasticsearch_config_template: "{{ role_path }}/templates/elasticsearch.yml.j2"
elk_logstash_config_template: "{{ role_path }}/templates/logstash.yml.j2"
elk_logstash_pipeline_template: "{{ role_path }}/templates/logstash.conf.j2"
elk_kibana_config_template: "{{ role_path }}/templates/kibana.yml.j2"

# Pod
elk_pod_name: elk
elk_network_name: elk

# Images (pulled from Harbor, versions from group_vars/all/main.yml)
elk_elasticsearch_image: "{{ harbor_hostname }}/library/elasticsearch:{{ elasticsearch_version }}"
elk_logstash_image: "{{ harbor_hostname }}/library/logstash:{{ logstash_version }}"
elk_kibana_image: "{{ harbor_hostname }}/library/kibana:{{ kibana_version }}"

# Elasticsearch
elasticsearch_heap_size: "4g"
elasticsearch_cluster_name: "elk-cluster"
elasticsearch_http_port: 9200
elasticsearch_transport_port: 9300
elasticsearch_data_dir: "{{ elk_data_dir }}/elasticsearch"

# Logstash
logstash_heap_size: "2g"
logstash_http_port: 9600
logstash_beats_port: 5044

# Kibana
kibana_port: 5601

# Reverse proxy (nginx)
elk_nginx_cert_path: "/etc/pki/tls/certs/{{ vm_hostname }}.crt"
elk_nginx_key_path: "/etc/pki/tls/private/{{ vm_hostname }}.key"
