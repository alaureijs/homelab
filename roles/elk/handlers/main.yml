---
- name: Restart ELK stack
  ansible.builtin.shell: |
    podman kube play --down {{ elk_config_dir }}/elk-pod.yml 2>/dev/null || true
    chown -R 1000:1000 {{ elasticsearch_data_dir }}
    podman kube play --network {{ elk_network_name }} {{ elk_config_dir }}/elk-pod.yml
  args:
    executable: /bin/bash
  changed_when: true

- name: Restart rsyslog
  ansible.builtin.systemd:
    name: rsyslog
    state: restarted

- name: Reload nginx
  ansible.builtin.systemd:
    name: nginx
    state: reloaded
