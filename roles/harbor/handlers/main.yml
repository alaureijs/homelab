---
- name: Restart harbor
  ansible.builtin.shell: |
    set -e
    for d in common common/config common/config/core common/config/registry \
             common/config/db common/config/redis common/config/jobservice \
             common/config/log common/config/nginx common/config/portal \
             common/config/registryctl common/config/trivy-adapter \
             common/config/exporter common/config/shared; do
      mkdir -p "$d"
    done
    ./prepare --with-trivy
    cp docker-compose.yml docker-compose.yml.bak
    python3 -c "
    import yaml, sys
    with open('docker-compose.yml') as f:
        data = yaml.safe_load(f)
    for svc in data.get('services', {}).values():
        svc.pop('logging', None)
    with open('docker-compose.yml', 'w') as f:
        yaml.dump(data, f, default_flow_style=False, sort_keys=False)
    "
    {% if harbor_trivy_db_mirror | default(false) | bool %}
    python3 -c "
    import yaml
    with open('docker-compose.yml') as f:
        data = yaml.safe_load(f)
    svc = data.get('services', {}).get('trivy-adapter', {})
    env = svc.get('environment', [])
    key = 'SCANNER_TRIVY_DB_REPOSITORY={{ harbor_hostname }}/{{ harbor_trivy_db_mirror_project }}/trivy-db'
    if not any(e.startswith('SCANNER_TRIVY_DB_REPOSITORY=') for e in env):
        env.append(key)
        svc['environment'] = env
    with open('docker-compose.yml', 'w') as f:
        yaml.dump(data, f, default_flow_style=False, sort_keys=False)
    "
    {% endif %}
    /usr/local/bin/podman-compose down && /usr/local/bin/podman-compose up -d
  args:
    chdir: "{{ harbor_install_dir }}"
    executable: /bin/bash
  changed_when: true

- name: Restart rsyslog
  ansible.builtin.systemd:
    name: rsyslog
    state: restarted

- name: Reload systemd and enable harbor
  ansible.builtin.systemd:
    daemon_reload: true
    name: harbor
    enabled: true
    state: started
