---
- name: Check if Harbor is already installed
  ansible.builtin.stat:
    path: "{{ harbor_install_dir }}/harbor.yml"
  register: harbor_installed

- name: Download Harbor offline installer
  ansible.builtin.get_url:
    url: "https://github.com/goharbor/harbor/releases/download/{{ harbor_version }}/harbor-offline-installer-{{ harbor_version }}.tgz"
    dest: "/tmp/harbor-offline-installer-{{ harbor_version }}.tgz"
    mode: "0644"
  when: not harbor_installed.stat.exists

- name: Create install directory
  ansible.builtin.file:
    path: "{{ harbor_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Extract Harbor installer
  ansible.builtin.unarchive:
    src: "/tmp/harbor-offline-installer-{{ harbor_version }}.tgz"
    dest: "/tmp"
    remote_src: true
  when: not harbor_installed.stat.exists

- name: Copy extracted files to install directory
  ansible.builtin.copy:
    src: "/tmp/harbor/"
    dest: "{{ harbor_install_dir }}/"
    remote_src: true
    owner: root
    group: root
    mode: "preserve"
  when: not harbor_installed.stat.exists

- name: Load Harbor images into Podman
  ansible.builtin.command: "podman load -i {{ harbor_install_dir }}/harbor.{{ harbor_version }}.tar.gz"
  register: harbor_load
  changed_when: "'Loaded image' in harbor_load.stdout"
  when: not harbor_installed.stat.exists

- name: Create data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ harbor_data_dir }}"
    - "{{ harbor_data_dir }}/ca_download"
    - "{{ harbor_data_dir }}/database"
    - "{{ harbor_data_dir }}/redis"
    - "{{ harbor_data_dir }}/registry"
    - "{{ harbor_data_dir }}/job_logs"
    - "{{ harbor_data_dir }}/storage"
    - "{{ harbor_data_dir }}/config"

- name: Copy harbor.yml.tmpl to harbor.yml
  ansible.builtin.copy:
    src: "{{ harbor_install_dir }}/harbor.yml.tmpl"
    dest: "{{ harbor_install_dir }}/harbor.yml"
    remote_src: true
    owner: root
    group: root
    mode: "0644"
    force: false
  when: not harbor_installed.stat.exists

- name: Configure hostname in harbor.yml
  ansible.builtin.replace:
    path: "{{ harbor_install_dir }}/harbor.yml"
    regexp: '^hostname: .*$'
    replace: "hostname: {{ harbor_hostname }}"
  when: not harbor_installed.stat.exists
  notify: Restart harbor

- name: Configure admin password in harbor.yml
  ansible.builtin.replace:
    path: "{{ harbor_install_dir }}/harbor.yml"
    regexp: '^harbor_admin_password: .*$'
    replace: "harbor_admin_password: {{ harbor_admin_password }}"
  when: not harbor_installed.stat.exists

- name: Configure TLS in harbor.yml
  when: harbor_tls_enabled | bool
  block:
    - name: Set certificate path in harbor.yml
      ansible.builtin.replace:
        path: "{{ harbor_install_dir }}/harbor.yml"
        regexp: 'certificate: /your/certificate/path'
        replace: "certificate: {{ harbor_tls_cert_path }}"
      when: not harbor_installed.stat.exists

    - name: Set private_key path in harbor.yml
      ansible.builtin.replace:
        path: "{{ harbor_install_dir }}/harbor.yml"
        regexp: 'private_key: /your/private/key/path'
        replace: "private_key: {{ harbor_tls_key_path }}"
      when: not harbor_installed.stat.exists

- name: Configure Trivy in harbor.yml
  when: harbor_enable_trivy | bool
  block:
    - name: Enable Trivy skip_update for offline environments
      ansible.builtin.replace:
        path: "{{ harbor_install_dir }}/harbor.yml"
        regexp: '^\s*skip_update: false'
        replace: "  skip_update: true"
      when: not harbor_installed.stat.exists and not (harbor_trivy_db_mirror | default(false) | bool)

- name: Configure metrics in harbor.yml
  when: harbor_enable_metrics | bool
  block:
    - name: Enable Harbor metrics
      ansible.builtin.replace:
        path: "{{ harbor_install_dir }}/harbor.yml"
        regexp: '# metric:\n#   enabled: false\n#   port: 9090\n#   path: /metrics'
        replace: |
          metric:
            enabled: true
            port: {{ harbor_metrics_port }}
            path: /metrics
      register: harbor_metrics_config
      notify: Restart harbor

    - name: Open metrics port in firewall
      ansible.posix.firewalld:
        port: "{{ harbor_metrics_port }}/tcp"
        permanent: true
        state: enabled
        immediate: true

- name: Create docker symlink for podman
  ansible.builtin.file:
    src: /usr/bin/podman
    dest: /usr/bin/docker
    state: link
    force: true

- name: Ensure common config directories exist for prepare
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ harbor_install_dir }}/common"
    - "{{ harbor_install_dir }}/common/config"
    - "{{ harbor_install_dir }}/common/config/core"
    - "{{ harbor_install_dir }}/common/config/registry"
    - "{{ harbor_install_dir }}/common/config/db"
    - "{{ harbor_install_dir }}/common/config/redis"
    - "{{ harbor_install_dir }}/common/config/jobservice"
    - "{{ harbor_install_dir }}/common/config/log"
    - "{{ harbor_install_dir }}/common/config/nginx"
    - "{{ harbor_install_dir }}/common/config/portal"
    - "{{ harbor_install_dir }}/common/config/registryctl"
    - "{{ harbor_install_dir }}/common/config/trivy-adapter"

- name: Run Harbor prepare
  ansible.builtin.command: "{{ harbor_install_dir }}/prepare --with-trivy"
  args:
    chdir: "{{ harbor_install_dir }}"
  register: harbor_prepare
  changed_when: "'prepare base dir' in harbor_prepare.stdout"

- name: Create Harbor log directory
  ansible.builtin.file:
    path: /var/log/harbor
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy rsyslog config for Harbor container logs
  ansible.builtin.copy:
    content: |
      # Harbor container logs — route stdout/stderr from conmon to per-container files
      template(name="HarborLogFile" type="string" string="/var/log/harbor/%programname%.log")

      if $programname == "harbor-core" or
         $programname == "harbor-db" or
         $programname == "harbor-jobservice" or
         $programname == "harbor-portal" or
         $programname == "harbor-log" or
         $programname == "registry" or
         $programname == "registryctl" or
         $programname == "trivy-adapter" or
         $programname == "redis" or
         $programname == "nginx" then {
          action(type="omfile" dynaFile="HarborLogFile"
                 fileCreateMode="0644" dirCreateMode="0755")
          stop
      }
    dest: /etc/rsyslog.d/30-harbor.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart rsyslog

- name: Deploy logrotate config for Harbor logs
  ansible.builtin.copy:
    content: |
      /var/log/harbor/*.log {
          daily
          rotate 14
          compress
          delaycompress
          missingok
          notifempty
          copytruncate
          dateext
          dateformat -%Y%m%d
      }
    dest: /etc/logrotate.d/harbor
    owner: root
    group: root
    mode: "0644"

- name: Patch docker-compose.yml for Podman compatibility
  ansible.builtin.shell: |
    cp docker-compose.yml docker-compose.yml.bak
    python3 -c "
    import yaml, sys
    with open('docker-compose.yml') as f:
        data = yaml.safe_load(f)
    for svc in data.get('services', {}).values():
        svc.pop('logging', None)
    with open('docker-compose.yml', 'w') as f:
        yaml.dump(data, f, default_flow_style=False, sort_keys=False)
    "
  args:
    chdir: "{{ harbor_install_dir }}"
    executable: /bin/bash
  register: harbor_patch
  changed_when: harbor_patch.rc == 0

- name: Inject Trivy DB repository env var into docker-compose.yml
  ansible.builtin.shell: |
    python3 -c "
    import yaml
    with open('docker-compose.yml') as f:
        data = yaml.safe_load(f)
    svc = data.get('services', {}).get('trivy-adapter', {})
    env = svc.get('environment', [])
    key = 'SCANNER_TRIVY_DB_REPOSITORY={{ harbor_hostname }}/{{ harbor_trivy_db_mirror_project }}/trivy-db'
    if not any(e.startswith('SCANNER_TRIVY_DB_REPOSITORY=') for e in env):
        env.append(key)
        svc['environment'] = env
    with open('docker-compose.yml', 'w') as f:
        yaml.dump(data, f, default_flow_style=False, sort_keys=False)
    "
  args:
    chdir: "{{ harbor_install_dir }}"
    executable: /bin/bash
  when: harbor_trivy_db_mirror | default(false) | bool
  register: trivy_env_patch
  changed_when: trivy_env_patch.rc == 0

- name: Tag Harbor images for offline registry
  ansible.builtin.shell: |
    set -e
    for img in $(podman images --format '{% raw %}{{.Repository}}:{{.Tag}}{% endraw %}' | grep '^localhost/goharbor/'); do
      new_name=$(echo "$img" | sed 's|^localhost/goharbor/|{{ harbor_hostname }}/library/goharbor/|')
      podman tag "$img" "$new_name"
    done
  args:
    executable: /bin/bash
  register: harbor_tag
  changed_when: "'localhost/' in harbor_tag.stdout or harbor_tag.rc == 0"

- name: Stop Harbor containers before recreate
  ansible.builtin.command: /usr/local/bin/podman-compose down
  args:
    chdir: "{{ harbor_install_dir }}"
  register: harbor_down
  changed_when: "'Removed' in harbor_down.stdout or harbor_down.rc == 0"

- name: Start Harbor containers
  ansible.builtin.command: /usr/local/bin/podman-compose up -d
  args:
    chdir: "{{ harbor_install_dir }}"
  register: harbor_compose
  changed_when: "'Started' in harbor_compose.stdout or 'Created' in harbor_compose.stdout"

- name: Deploy Harbor systemd service
  ansible.builtin.template:
    src: harbor.service.j2
    dest: /etc/systemd/system/harbor.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd and enable harbor

- name: Flush handlers to activate systemd service
  ansible.builtin.meta: flush_handlers
