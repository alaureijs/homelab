---
- name: Wait for Harbor API to be ready
  ansible.builtin.uri:
    url: "https://{{ harbor_hostname }}/api/v2.0/health"
    method: GET
    user: admin
    password: "{{ harbor_admin_password }}"
    force_basic_auth: true
    validate_certs: false
    status_code: [200]
  register: _harbor_health
  until: _harbor_health.status == 200
  retries: 30
  delay: 10

- name: Wait for Harbor to be fully ready
  ansible.builtin.uri:
    url: "https://{{ harbor_hostname }}/api/v2.0/systeminfo/volumes"
    method: GET
    user: admin
    password: "{{ harbor_admin_password }}"
    force_basic_auth: true
    validate_certs: false
    status_code: [200]
  register: _harbor_volumes
  until: _harbor_volumes.status == 200
  retries: 10
  delay: 30

- name: Fetch existing Harbor registries
  ansible.builtin.uri:
    url: "https://{{ harbor_hostname }}/api/v2.0/registries"
    method: GET
    user: admin
    password: "{{ harbor_admin_password }}"
    force_basic_auth: true
    return_content: true
    validate_certs: false
  register: _harbor_config_registries_response
  when: harbor_config_registries | length > 0

- name: Build registries lookup map
  ansible.builtin.set_fact:
    _harbor_config_registries_map: >-
      {{ _harbor_config_registries_map | default({}) |
      combine({item.name: item.id}) }}
  loop: "{{ _harbor_config_registries_response.json | default([]) }}"
  loop_control:
    label: "{{ item.name }}: id={{ item.id }}"
  when:
    - harbor_config_registries | length > 0
    - _harbor_config_registries_response is not skipped

- name: Create Harbor registries
  ansible.builtin.uri:
    url: "https://{{ harbor_hostname }}/api/v2.0/registries"
    method: POST
    user: admin
    password: "{{ harbor_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      name: "{{ item.name }}"
      type: "{{ item.type }}"
      url: "{{ item.url }}"
      insecure: "{{ item.insecure | default(false) }}"
      enabled: "{{ item.enabled | default(true) }}"
      credential:
        type: secret
        access_key: ""
        access_secret: ""
    status_code: [201, 409]
    validate_certs: false
  loop: "{{ harbor_config_registries }}"
  loop_control:
    label: "{{ item.name }}: {{ item.url }}"
  when: item.name not in (_harbor_config_registries_map | default({}))
  register: _harbor_reg_create
  until: _harbor_reg_create.status in [201, 409]
  retries: 5
  delay: 30

- name: Re-fetch Harbor registries after creation
  ansible.builtin.uri:
    url: "https://{{ harbor_hostname }}/api/v2.0/registries"
    method: GET
    user: admin
    password: "{{ harbor_admin_password }}"
    force_basic_auth: true
    return_content: true
    validate_certs: false
  register: _harbor_config_registries_response
  when: harbor_config_registries | length > 0

- name: Rebuild registries lookup map
  ansible.builtin.set_fact:
    _harbor_config_registries_map: >-
      {{ _harbor_config_registries_map | default({}) |
      combine({item.name: item.id}) }}
  loop: "{{ _harbor_config_registries_response.json | default([]) }}"
  loop_control:
    label: "{{ item.name }}: id={{ item.id }}"
  when:
    - harbor_config_registries | length > 0

- name: Fetch existing Harbor projects
  ansible.builtin.uri:
    url: "https://{{ harbor_hostname }}/api/v2.0/projects"
    method: GET
    user: admin
    password: "{{ harbor_admin_password }}"
    force_basic_auth: true
    return_content: true
    validate_certs: false
  register: _harbor_config_projects_response

- name: Build projects lookup
  ansible.builtin.set_fact:
    _harbor_config_existing_projects: >-
      {{ _harbor_config_projects_response.json | default([])
      | map(attribute='name') | list }}

- name: Build registry URL to ID lookup
  ansible.builtin.set_fact:
    _harbor_config_registry_url_to_id: >-
      {{ _harbor_config_registry_url_to_id | default({}) |
      combine({reg_url: _harbor_config_registries_map[reg_name]}) }}
  loop: "{{ harbor_config_registry_map | dict2items }}"
  loop_control:
    label: "{{ item.key }}: {{ item.value }}"
  vars:
    reg_name: "{{ item.key }}"
    reg_url: "{{ item.value }}"
  when:
    - harbor_config_registries | length > 0
    - reg_name in _harbor_config_registries_map

- name: Create proxy cache projects
  ansible.builtin.uri:
    url: "https://{{ harbor_hostname }}/api/v2.0/projects"
    method: POST
    user: admin
    password: "{{ harbor_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      project_name: "{{ item.value }}"
      registry_id: "{{ _harbor_config_registry_url_to_id[item.key] }}"
      metadata:
        public: "false"
    status_code: [201, 409]
    validate_certs: false
  loop: "{{ harbor_config_proxy_projects | dict2items }}"
  loop_control:
    label: "{{ item.value }} -> {{ item.key }}"
  when:
    - harbor_config_registries | length > 0
    - item.value not in (_harbor_config_existing_projects | default([]))

- name: Create sync projects from harbor_sync_images
  ansible.builtin.uri:
    url: "https://{{ harbor_hostname }}/api/v2.0/projects"
    method: POST
    user: admin
    password: "{{ harbor_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      project_name: "{{ item }}"
      public: false
    status_code: [201, 409]
    validate_certs: false
  loop: "{{ harbor_sync_images | default([]) | map(attribute='name') | map('regex_replace', '([^/]+)/.*', '\\1') | unique | list }}"
  loop_control:
    label: "{{ item }}"
  when:
    - harbor_config_sync_projects | default(false) | bool
    - harbor_sync_images | default([]) | length > 0
    - item not in _harbor_config_existing_projects

- name: Create Harbor projects
  ansible.builtin.uri:
    url: "https://{{ harbor_hostname }}/api/v2.0/projects"
    method: POST
    user: admin
    password: "{{ harbor_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      project_name: "{{ item.name }}"
      public: "{{ item.public }}"
    status_code: [201, 409]
    validate_certs: false
  loop: "{{ harbor_config_projects }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.name not in _harbor_config_existing_projects

- name: Create Harbor users
  ansible.builtin.uri:
    url: "https://{{ harbor_hostname }}/api/v2.0/users"
    method: POST
    user: admin
    password: "{{ harbor_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      username: "{{ item.username }}"
      password: "{{ item.password }}"
      realname: "{{ item.realname }}"
      email: "{{ item.email }}"
    status_code: [201, 409]
    validate_certs: false
  loop: "{{ harbor_config_users }}"

- name: Collect unique project names from user roles
  ansible.builtin.set_fact:
    _harbor_config_project_names: "{{ harbor_config_users | map(attribute='roles') | flatten | map(attribute='project_name') | unique | list }}"

- name: Get existing project members
  ansible.builtin.uri:
    url: "https://{{ harbor_hostname }}/api/v2.0/projects/{{ item }}/members"
    method: GET
    user: admin
    password: "{{ harbor_admin_password }}"
    force_basic_auth: true
    return_content: true
    validate_certs: false
  loop: "{{ _harbor_config_project_names }}"
  register: _harbor_config_members_raw

- name: Build members lookup map
  ansible.builtin.set_fact:
    _harbor_config_members_map: >-
      {{ _harbor_config_members_map | default({}) |
      combine({item.item: item.json}) }}
  loop: "{{ _harbor_config_members_raw.results }}"
  loop_control:
    label: "{{ item.item }}: {{ item.json | length }} members"

- name: Assign project member roles
  ansible.builtin.include_tasks: _assign-member.yml
  loop: "{{ harbor_config_users | subelements('roles') }}"
  loop_control:
    label: "{{ item.1.project_name }} -> {{ item.0.username }} (role {{ item.1.role_id }})"

- name: Enable auto-scan on projects
  ansible.builtin.uri:
    url: "https://{{ harbor_hostname }}/api/v2.0/projects/{{ item }}"
    method: PUT
    user: admin
    password: "{{ harbor_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      metadata:
        auto_scan: "true"
    status_code: [200]
    validate_certs: false
  loop: "{{ _harbor_config_existing_projects | default([]) }}"
  loop_control:
    label: "{{ item }}"
  when: harbor_config_auto_scan | default(true) | bool
