---
- name: Pull image through proxy cache
  containers.podman.podman_image:
    name: "{{ harbor_hostname }}/{{ harbor_config_proxy_projects[item.registry] }}/{{ item.name }}"
    tag: "{{ item.tag }}"
    pull: true
    force: true
    validate_certs: false

- name: Tag image for Harbor project
  containers.podman.podman_tag:
    image: "{{ harbor_hostname }}/{{ harbor_config_proxy_projects[item.registry] }}/{{ item.name }}:{{ item.tag }}"
    target_names:
      - "{{ harbor_hostname }}/{{ item.project }}/{{ item.name }}:{{ item.tag }}"

- name: Push image to Harbor project
  ansible.builtin.shell: |
    podman push "{{ harbor_hostname }}/{{ item.project }}/{{ item.name }}:{{ item.tag }}"
  args:
    executable: /bin/bash
