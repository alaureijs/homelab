---
- name: Ensure report directory exists
  ansible.builtin.file:
    path: "{{ harbor_containers_report_dir }}"
    state: directory
    mode: "0755"

- name: Ensure local reports directory exists
  ansible.builtin.file:
    path: "{{ playbook_dir }}/{{ harbor_containers_local_report_dir }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false

- name: Ensure auth directory exists
  ansible.builtin.file:
    path: "{{ harbor_containers_auth_dir }}"
    state: directory
    mode: "0700"

- name: Write Harbor auth file
  ansible.builtin.copy:
    content: >-
      {{ {'auths': {harbor_hostname: {'auth': (harbor_containers_sync_user + ':' + vault_harbor_sync_password) | b64encode}}} | to_json }}
    dest: "{{ harbor_containers_auth_dir }}/auth.json"
    mode: "0600"

- name: Sync images to Harbor
  ansible.builtin.include_tasks: _sync-image.yml
  loop: "{{ harbor_sync_images | subelements('tags') }}"
  loop_control:
    label: "{{ item.0.registry }}/{{ item.0.name }}:{{ item.1 }} -> {{ item.0.name | regex_replace('([^/]+)/.*', '\\1') }}/{{ item.0.name | regex_replace('.*/', '') }}:{{ item.1 }}"

- name: Check upstream for latest versions
  ansible.builtin.shell: |
    set -euo pipefail

    IMAGE="{{ item.0.name }}"
    REGISTRY="{{ item.0.registry }}"
    CURRENT="{{ item.1 }}"

    TAGS=$(skopeo list-tags "docker://$REGISTRY/$IMAGE" 2>/dev/null \
      | python3 -c "
    import sys, json, re
    tags = json.load(sys.stdin).get('Tags', [])
    current = '$CURRENT'

    def ver_key(v):
        p = re.split(r'[^0-9]+', v.lstrip('v'))
        return tuple(int(x) for x in p if x)

    def tag_pattern(t):
        m = re.match(r'^(v?)([0-9]+(?:\.[0-9]+)*)(.*)', t)
        if not m:
            return None
        return (m.group(1), len(m.group(2).split('.')), m.group(3))

    current_pattern = tag_pattern(current)

    EXCLUDE = re.compile(
        r'rc|nightly|beta|[0-9]b[0-9]|alpha|[0-9]a[0-9]'
        r'|windowsserver|nanoserver|desktop|oci|preview'
        r'|ubi|lts|noble|jammy|focal|bookworm|bullseye',
        re.IGNORECASE)
    version_tags = [
        t for t in tags
        if re.match(r'^v?[0-9]+\.[0-9]', t)
        and not EXCLUDE.search(t)
        and not re.search(r'[0-9]{6,}', t)
        and tag_pattern(t) == current_pattern]
    version_tags.sort(key=ver_key)
    if version_tags:
        print(version_tags[-1])
    else:
        print('NONE')
    " 2>/dev/null || echo "NONE")

    echo "$TAGS"
  args:
    executable: /bin/bash
  loop: "{{ harbor_sync_images | subelements('tags') }}"
  loop_control:
    label: "{{ item.0.registry }}/{{ item.0.name }}:{{ item.1 }}"
  register: harbor_containers_upstream_versions
  ignore_errors: true
  changed_when: false

- name: Build version report
  ansible.builtin.set_fact:
    harbor_containers_sync_report: >-
      {{ harbor_containers_sync_report | default({}) | combine(
          {item.item.0.name | regex_replace('.*/', ''): {
            'full_name': item.item.0.name,
            'current_tag': item.item.1,
            'registry': item.item.0.registry,
            'project': item.item.0.name.split('/')[0],
            'synced': true,
            'latest_version': item.stdout | default('NONE'),
            'update_available': (
              item.stdout | default('NONE') != 'NONE' and
              item.stdout | default('NONE') != item.item.1
            )
          }}
          if (item.item.0.name | regex_replace('.*/', '') not in harbor_containers_sync_report | default({}))
          else {}
      ) }}
  loop: "{{ harbor_containers_upstream_versions.results }}"
  loop_control:
    label: "{{ item.item.0.name }}:{{ item.item.1 }} -> {{ item.stdout | default('?') }}"

- name: Generate sync report file
  ansible.builtin.copy:
    content: "{{ harbor_containers_sync_report | to_nice_yaml }}"
    dest: "{{ harbor_containers_report_dir }}/sync-report-{{ ansible_date_time.date }}.yml"
    mode: "0644"

- name: Fetch sync report to controller
  ansible.builtin.fetch:
    src: "{{ harbor_containers_report_dir }}/sync-report-{{ ansible_date_time.date }}.yml"
    dest: "{{ playbook_dir }}/{{ harbor_containers_local_report_dir }}/sync-report-{{ ansible_date_time.date }}.yml"
    flat: true

- name: Display sync summary
  ansible.builtin.debug:
    msg: |
      Harbor Sync Report
      ==================
      {% for name, info in harbor_containers_sync_report.items() %}
      {{ name }}:{{ info.current_tag }}
        Status: {{ 'SYNCED' if info.synced else 'FAILED' }}
        Latest: {{ info.latest_version }}
        Update: {{ 'YES (' + info.latest_version + ')' if info.update_available else 'no' }}
      {% endfor %}

      Reports saved to:
        {{ harbor_containers_local_report_dir }}/sync-report-{{ ansible_date_time.date }}.yml

- name: Remove Harbor auth file
  ansible.builtin.file:
    path: "{{ harbor_containers_auth_dir }}/auth.json"
    state: absent
