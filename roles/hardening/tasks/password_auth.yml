---
- name: Set password aging in /etc/login.defs
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: "^PASS_MAX_DAYS", line: "PASS_MAX_DAYS   {{ hardening_password_max_days }}" }
    - { regexp: "^PASS_MIN_DAYS", line: "PASS_MIN_DAYS   {{ hardening_password_min_days }}" }
    - { regexp: "^PASS_WARN_AGE", line: "PASS_WARN_AGE   {{ hardening_password_warn_days }}" }
    - { regexp: "^PASS_MIN_LEN", line: "PASS_MIN_LEN    {{ hardening_password_min_len }}" }
    - { regexp: "^PASS_REUSE_DAYS", line: "PASS_REUSE_DAYS {{ hardening_password_remember }}" }
    - { regexp: "^UMASK", line: "UMASK           {{ hardening_umask_value }}" }
    - { regexp: "^ENCRYPT_METHOD", line: "ENCRYPT_METHOD SHA512" }
    - { regexp: "^SHA_CRYPT_MIN_ROUNDS", line: "SHA_CRYPT_MIN_ROUNDS 10000" }
    - { regexp: "^SHA_CRYPT_MAX_ROUNDS", line: "SHA_CRYPT_MAX_ROUNDS 10000" }

- name: Install pam_pwquality
  ansible.builtin.dnf:
    name: libpwquality
    state: present

- name: Configure pam_pwquality (CIS 5.3.1)
  ansible.builtin.lineinfile:
    path: /etc/security/pwquality.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: "^minlen", line: "minlen = {{ hardening_pwquality_minlen }}" }
    - { regexp: "^dcredit", line: "dcredit = {{ hardening_pwquality_dcredit }}" }
    - { regexp: "^ucredit", line: "ucredit = {{ hardening_pwquality_ucredit }}" }
    - { regexp: "^ocredit", line: "ocredit = {{ hardening_pwquality_ocredit }}" }
    - { regexp: "^lcredit", line: "lcredit = {{ hardening_pwquality_lcredit }}" }
    - { regexp: "^maxrepeat", line: "maxrepeat = {{ hardening_pwquality_maxrepeat }}" }
    - { regexp: "^maxclassrepeat", line: "maxclassrepeat = {{ hardening_pwquality_maxclassrepeat }}" }

- name: Set faillock preauth line
  ansible.builtin.set_fact:
    hardening_faillock_preauth: >-
      auth required pam_faillock.so preauth silent audit
      deny={{ hardening_lockout_attempts }}
      unlock_time={{ hardening_lockout_unlock_time }}

- name: Set faillock authfail line
  ansible.builtin.set_fact:
    hardening_faillock_authfail: >-
      auth [default=die] pam_faillock.so authfail audit
      deny={{ hardening_lockout_attempts }}
      unlock_time={{ hardening_lockout_unlock_time }}

- name: Configure PAM lockout — faillock
  ansible.builtin.lineinfile:
    path: /etc/pam.d/system-auth
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    insertbefore: "^auth.*pam_unix.so"
  loop:
    - { regexp: "^auth.*pam_faillock.so preauth",
        line: "{{ hardening_faillock_preauth }}" }
    - { regexp: "^auth.*pam_faillock.so authfail",
        line: "{{ hardening_faillock_authfail }}" }

- name: Configure PAM lockout — faillock in password-auth
  ansible.builtin.lineinfile:
    path: /etc/pam.d/password-auth
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    insertbefore: "^auth.*pam_unix.so"
  loop:
    - { regexp: "^auth.*pam_faillock.so preauth",
        line: "{{ hardening_faillock_preauth }}" }
    - { regexp: "^auth.*pam_faillock.so authfail",
        line: "{{ hardening_faillock_authfail }}" }

- name: Configure PAM password history
  ansible.builtin.lineinfile:
    path: /etc/pam.d/system-auth
    regexp: "^password.*pam_unix.so"
    line: "password    sufficient    pam_unix.so remember={{ hardening_pam_remember }} use_authtok sha512 shadow"

- name: Configure PAM password history (password-auth)
  ansible.builtin.lineinfile:
    path: /etc/pam.d/password-auth
    regexp: "^password.*pam_unix.so"
    line: "password    sufficient    pam_unix.so remember={{ hardening_pam_remember }} use_authtok sha512 shadow"

- name: Require root password for single-user mode
  ansible.builtin.lineinfile:
    path: /etc/systemd/system/rescue.service.d/override.conf
    regexp: "^ExecStart="
    line: "/usr/lib/systemd/systemd-sulogin-shell rescue"
    create: true
    owner: root
    group: root
    mode: "0644"
