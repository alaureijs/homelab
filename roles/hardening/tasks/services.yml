---
- name: Disable unnecessary services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
    masked: true
  loop: "{{ hardening_disable_services }}"
  ignore_errors: true
  register: hardening_disable_result
  failed_when:
    - hardening_disable_result is failed
    - "'Could not find the requested service' not in hardening_disable_result.msg"
    - "'System has not been booted with systemd' not in hardening_disable_result.msg"

- name: Ensure chrony is running
  ansible.builtin.systemd:
    name: chronyd
    state: started
    enabled: true
  when: hardening_chrony
  failed_when: false

- name: Ensure chrony is installed
  ansible.builtin.dnf:
    name: chrony
    state: present
  when: hardening_chrony

- name: Mask rsh services (STIG V-257793)
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    masked: true
  loop:
    - rsh.socket
    - rlogin.socket
    - rexec.socket
  failed_when: false

- name: Disable USB storage (CIS 1.1.1.3)
  ansible.builtin.lineinfile:
    path: /etc/modprobe.d/hardening.conf
    regexp: "^install usb-storage"
    line: "install usb-storage /bin/true"
    create: true
    owner: root
    group: root
    mode: "0644"

