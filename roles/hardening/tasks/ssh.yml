---
- name: SSH hardening — configure sshd_config
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
    validate: "sshd -t -f %s"
  loop:
    - { regexp: "^#?Port ", line: "Port {{ hardening_ssh_port }}" }
    - { regexp: "^#?Protocol ", line: "Protocol {{ hardening_ssh_protocol }}" }
    - { regexp: "^#?X11Forwarding ",
        line: "X11Forwarding {{ hardening_ssh_x11_forwarding | ternary('yes', 'no') }}" }
    - { regexp: "^#?MaxAuthTries ",
        line: "MaxAuthTries {{ hardening_ssh_max_auth_tries }}" }
    - { regexp: "^#?MaxSessions ",
        line: "MaxSessions {{ hardening_ssh_max_sessions }}" }
    - { regexp: "^#?LoginGraceTime ",
        line: "LoginGraceTime {{ hardening_ssh_login_grace_time }}" }
    - { regexp: "^#?ClientAliveInterval ",
        line: "ClientAliveInterval {{ hardening_ssh_client_alive_interval }}" }
    - { regexp: "^#?ClientAliveCountMax ",
        line: "ClientAliveCountMax {{ hardening_ssh_client_alive_count }}" }
    - { regexp: "^#?PermitRootLogin ",
        line: "PermitRootLogin {{ hardening_ssh_permit_root_login }}" }
    - { regexp: "^#?PermitEmptyPasswords ",
        line: "PermitEmptyPasswords {{ hardening_ssh_permit_empty_passwords | ternary('yes', 'no') }}" }
    - { regexp: "^#?PermitUserEnvironment ",
        line: "PermitUserEnvironment {{ hardening_ssh_permit_user_environment | ternary('yes', 'no') }}" }
    - { regexp: "^#?PermitTunnel ",
        line: "PermitTunnel {{ hardening_ssh_permit_tunnel | ternary('yes', 'no') }}" }
    - { regexp: "^#?AllowAgentForwarding ",
        line: "AllowAgentForwarding {{ hardening_ssh_allow_agent_forwarding | ternary('yes', 'no') }}" }
    - { regexp: "^#?AllowTcpForwarding ",
        line: "AllowTcpForwarding {{ hardening_ssh_allow_tcp_forwarding }}" }
    - { regexp: "^#?PrintLastLog ",
        line: "PrintLastLog {{ hardening_ssh_print_last_log | ternary('yes', 'no') }}" }
    - { regexp: "^#?X11DisplayOffset ",
        line: "X11DisplayOffset {{ hardening_ssh_x11_display_offset }}" }
    - { regexp: "^#?MaxStartups",
        line: "MaxStartups {{ hardening_ssh_max_startups_start }}:{{ hardening_ssh_max_startups_rate }}:{{ hardening_ssh_max_startups_full }}" }
    - { regexp: "^#?LogLevel ", line: "LogLevel {{ hardening_ssh_log_level }}" }
    - { regexp: "^#?Banner ", line: "Banner {{ hardening_ssh_banner }}" }
  notify: Restart sshd

- name: SSH hardening — configure crypto policies
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
    validate: "sshd -t -f %s"
  loop:
    - { regexp: "^#?HostKeyAlgorithms ", line: "HostKeyAlgorithms {{ hardening_ssh_host_key_algorithms | join(',') }}" }
    - { regexp: "^#?KexAlgorithms ", line: "KexAlgorithms {{ hardening_ssh_kex_algorithms | join(',') }}" }
    - { regexp: "^#?Ciphers ", line: "Ciphers {{ hardening_ssh_ciphers | join(',') }}" }
    - { regexp: "^#?MACs ", line: "MACs {{ hardening_ssh_macs | join(',') }}" }
  notify: Restart sshd

- name: SSH hardening — DenyUsers
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?DenyUsers "
    line: "DenyUsers {{ hardening_ssh_deny_users | join(' ') }}"
    state: "{{ 'present' if hardening_ssh_deny_users else 'absent' }}"
    validate: "sshd -t -f %s"
  notify: Restart sshd

- name: SSH hardening — AllowUsers
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?AllowUsers "
    line: "AllowUsers {{ hardening_ssh_allow_users | join(' ') }}"
    state: "{{ 'present' if hardening_ssh_allow_users else 'absent' }}"
    validate: "sshd -t -f %s"
  notify: Restart sshd

- name: SSH hardening — DenyGroups
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?DenyGroups "
    line: "DenyGroups {{ hardening_ssh_deny_groups | join(' ') }}"
    state: "{{ 'present' if hardening_ssh_deny_groups else 'absent' }}"
    validate: "sshd -t -f %s"
  notify: Restart sshd

- name: SSH hardening — AllowGroups
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?AllowGroups "
    line: "AllowGroups {{ hardening_ssh_allow_groups | join(' ') }}"
    state: "{{ 'present' if hardening_ssh_allow_groups else 'absent' }}"
    validate: "sshd -t -f %s"
  notify: Restart sshd
