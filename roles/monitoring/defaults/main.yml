---
# monitoring role defaults

monitoring_hostname: monitoring.local.lan

# Paths
monitoring_config_dir: /etc/monitoring
monitoring_data_dir: /var/lib/monitoring
monitoring_mtls_dir: /etc/prometheus/mtls

# Pod
monitoring_pod_name: monitoring
monitoring_network_name: monitoring

# Images (pulled from Harbor, versions from group_vars/all/versions.yml)
monitoring_grafana_image: "{{ harbor_hostname }}/grafana/grafana:{{ grafana_version }}"
monitoring_prometheus_image: "{{ harbor_hostname }}/prometheus/prometheus:{{ prometheus_version }}"
monitoring_alertmanager_image: "{{ harbor_hostname }}/prometheus/alertmanager:{{ alertmanager_version }}"

# Grafana
monitoring_grafana_admin_password: admin

# Prometheus
monitoring_prometheus_retention: "30d"
monitoring_prometheus_retention_size: "2GB"
monitoring_prometheus_scrape_interval: "15s"
monitoring_prometheus_evaluation_interval: "15s"

# Alertmanager
monitoring_alertmanager_smtp_smarthost: ""
monitoring_alertmanager_smtp_from: ""
monitoring_alertmanager_smtp_auth_username: ""
monitoring_alertmanager_smtp_auth_password: ""

# Reverse proxy (nginx)
monitoring_nginx_cert_path: "/etc/pki/tls/certs/{{ vm_hostname }}.crt"
monitoring_nginx_key_path: "/etc/pki/tls/private/{{ vm_hostname }}.key"

# mTLS for node-exporter scraping (paths only — certs generated by certificates role)
monitoring_mtls_ca_cert: "{{ monitoring_mtls_dir }}/ca.crt"
monitoring_mtls_client_cert: "{{ monitoring_mtls_dir }}/client.crt"
monitoring_mtls_client_key: "{{ monitoring_mtls_dir }}/client.key"

# Grafana dashboards to provision via ConfigMaps
monitoring_grafana_dashboards:
  - name: node-exporter
    file: "{{ role_path }}/files/dashboards/node-exporter.json"
  - name: prometheus
    file: "{{ role_path }}/files/dashboards/prometheus.json"
  - name: harbor
    file: "{{ role_path }}/files/dashboards/harbor.json"
  - name: elasticsearch
    file: "{{ role_path }}/files/dashboards/elasticsearch.json"

# ConfigMaps (inline in pod manifest)
# Use 'file' for static content, 'template' for Jinja2 templates
# Override these to use custom files: {{ playbook_dir }}/files/... or {{ playbook_dir }}/templates/...
monitoring_prometheus_config_template: "{{ role_path }}/templates/prometheus.yml.j2"
monitoring_prometheus_rules_file: "{{ role_path }}/files/prometheus/rules.yml"
monitoring_alertmanager_config_template: "{{ role_path }}/templates/alertmanager.yml.j2"
monitoring_grafana_datasources_file: "{{ role_path }}/files/grafana/datasources.yml"
monitoring_grafana_dashboards_provider_file: "{{ role_path }}/files/grafana/dashboards-provider.yml"

monitoring_configmaps:
  - name: "{{ monitoring_pod_name }}-datasources"
    file: "{{ monitoring_grafana_datasources_file }}"
  - name: "{{ monitoring_pod_name }}-dashboards-provider"
    file: "{{ monitoring_grafana_dashboards_provider_file }}"
  - name: "{{ monitoring_pod_name }}-prometheus"
    template: "{{ monitoring_prometheus_config_template }}"
  - name: "{{ monitoring_pod_name }}-prometheus-rules"
    file: "{{ monitoring_prometheus_rules_file }}"
  - name: "{{ monitoring_pod_name }}-alertmanager"
    template: "{{ monitoring_alertmanager_config_template }}"
