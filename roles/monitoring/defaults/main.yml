---
# monitoring role defaults

monitoring_hostname: monitoring.local.lan

# Paths
monitoring_config_dir: /etc/monitoring
monitoring_data_dir: /var/lib/monitoring
monitoring_mtls_dir: /etc/prometheus/mtls

# Pod
monitoring_pod_name: monitoring
monitoring_network_name: monitoring

# Images (pulled from Harbor, versions from group_vars/all/versions.yml)
monitoring_grafana_image: "{{ harbor_hostname }}/library/grafana/grafana:{{ grafana_version }}"
monitoring_prometheus_image: "{{ harbor_hostname }}/prometheus/prometheus/prometheus:{{ prometheus_version }}"
monitoring_alertmanager_image: "{{ harbor_hostname }}/prometheus/prometheus/alertmanager:{{ alertmanager_version }}"

# Grafana
monitoring_grafana_admin_password: admin

# Prometheus
monitoring_prometheus_retention: "30d"
monitoring_prometheus_retention_size: "2GB"
monitoring_prometheus_scrape_interval: "15s"
monitoring_prometheus_evaluation_interval: "15s"

# Alertmanager
monitoring_alertmanager_smtp_smarthost: ""
monitoring_alertmanager_smtp_from: ""
monitoring_alertmanager_smtp_auth_username: ""
monitoring_alertmanager_smtp_auth_password: ""

# Reverse proxy (nginx)
monitoring_nginx_cert_path: "/etc/pki/tls/certs/{{ vm_hostname }}.crt"
monitoring_nginx_key_path: "/etc/pki/tls/private/{{ vm_hostname }}.key"

# mTLS for node-exporter scraping
monitoring_mtls_ca_cert: "{{ monitoring_mtls_dir }}/ca.crt"
monitoring_mtls_client_cert: "{{ monitoring_mtls_dir }}/client.crt"
monitoring_mtls_client_key: "{{ monitoring_mtls_dir }}/client.key"

# Renew mTLS certificates when they expire within this many days
monitoring_cert_renew_threshold_days: 30

# Force mTLS certificate renewal regardless of monitoring_cert_force_renewal
monitoring_cert_force_renewal: false

# Grafana dashboards to provision (list of JSON files from files/dashboards/)
monitoring_grafana_dashboards:
  - "{{ role_path }}/files/dashboards/node-exporter.json"
