---
- name: Stop cockpit if running (port 9090 conflicts with Prometheus)
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop:
    - cockpit.socket
    - cockpit.service
  failed_when: false
  register: monitoring_cockpit_result
  changed_when: monitoring_cockpit_result is not skipped and monitoring_cockpit_result is succeeded

- name: Create monitoring directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ monitoring_config_dir }}"
    - "{{ monitoring_data_dir }}"
    - "{{ monitoring_data_dir }}/prometheus"
    - "{{ monitoring_data_dir }}/alertmanager"
    - "{{ monitoring_data_dir }}/grafana"

- name: Set grafana data directory ownership
  ansible.builtin.file:
    path: "{{ monitoring_data_dir }}/grafana"
    state: directory
    owner: "472"
    group: "472"
    mode: "0755"

- name: Set prometheus data directory ownership
  ansible.builtin.file:
    path: "{{ monitoring_data_dir }}/prometheus"
    state: directory
    owner: "65534"
    group: "65534"
    mode: "0755"

- name: Set alertmanager data directory ownership
  ansible.builtin.file:
    path: "{{ monitoring_data_dir }}/alertmanager"
    state: directory
    owner: "65534"
    group: "65534"
    mode: "0755"

- name: Ensure Podman auth directory exists
  ansible.builtin.file:
    path: /root/.config/containers
    state: directory
    mode: "0700"

- name: Write Podman auth for Harbor (used by podman kube play)
  ansible.builtin.copy:
    content: |
      {
        "auths": {
          "{{ harbor_hostname }}": {
            "auth": "{{ ('ansible-sync:' + vault_harbor_sync_password) | b64encode }}"
          }
        }
      }
    dest: /root/.config/containers/auth.json
    mode: "0600"
  no_log: true

- name: Fetch Harbor certificate from ansible01
  ansible.builtin.slurp:
    src: /etc/pki/tls/certs/harbor.crt
  delegate_to: ansible01
  register: monitoring_harbor_cert

- name: Write Harbor certificate for system trust
  ansible.builtin.copy:
    content: "{{ monitoring_harbor_cert.content | b64decode }}"
    dest: /etc/pki/ca-trust/source/anchors/harbor.crt
    mode: "0644"
  register: monitoring_harbor_cert_trust

- name: Update CA trust
  ansible.builtin.command: update-ca-trust
  changed_when: monitoring_harbor_cert_trust.changed

- name: Create containers certs directory for Harbor
  ansible.builtin.file:
    path: "/etc/containers/certs.d/{{ harbor_hostname }}"
    state: directory
    mode: "0755"

- name: Write Harbor certificate for containers
  ansible.builtin.copy:
    content: "{{ monitoring_harbor_cert.content | b64decode }}"
    dest: "/etc/containers/certs.d/{{ harbor_hostname }}/ca.crt"
    mode: "0644"

- name: Ensure mTLS directory exists
  ansible.builtin.file:
    path: "{{ monitoring_mtls_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Check if monitoring CA exists
  ansible.builtin.stat:
    path: "{{ monitoring_mtls_ca_cert }}"
  register: monitoring_ca_cert

- name: Get monitoring CA expiry info
  community.crypto.x509_certificate_info:
    path: "{{ monitoring_mtls_ca_cert }}"
  register: monitoring_ca_cert_info
  when: monitoring_ca_cert.stat.exists

- name: Determine if monitoring CA needs renewal
  ansible.builtin.set_fact:
    monitoring_ca_needs_renewal: >-
      {{ monitoring_cert_force_renewal | bool
         or not monitoring_ca_cert.stat.exists
         or (monitoring_ca_cert.stat.exists
             and monitoring_ca_cert_info.not_after is defined
             and ((monitoring_ca_cert_info.not_after | int - ansible_date_time.epoch | int)
                  < (monitoring_cert_renew_threshold_days * 86400))) }}

- name: Display monitoring CA status
  ansible.builtin.debug:
    msg: >-
      Monitoring CA: exists={{ monitoring_ca_cert.stat.exists }},
      {% if monitoring_ca_cert.stat.exists %}
      expires={{ monitoring_ca_cert_info.not_after | default('unknown') }},
      days_left={{ ((monitoring_ca_cert_info.not_after | default(0) | int - ansible_date_time.epoch | int) / 86400) | int }},
      {% endif %}
      threshold={{ monitoring_cert_renew_threshold_days }}d,
      force={{ monitoring_cert_force_renewal }},
      needs_renewal={{ monitoring_ca_needs_renewal }}

- name: Generate monitoring CA private key
  community.crypto.openssl_privatekey:
    path: "{{ monitoring_mtls_dir }}/ca.key"
    size: 4096
    mode: "0600"
  when: monitoring_ca_needs_renewal | bool

- name: Generate monitoring CA certificate
  ansible.builtin.command: >
    openssl req -x509 -new -nodes
    -key {{ monitoring_mtls_dir }}/ca.key
    -sha256 -days 3650
    -out {{ monitoring_mtls_ca_cert }}
    -subj "/CN=Monitoring CA/O=Lab"
    -addext "basicConstraints=critical,CA:TRUE,pathlen:0"
    -addext "keyUsage=critical,keyCertSign,cRLSign"
  changed_when: monitoring_ca_needs_renewal | bool
  when: monitoring_ca_needs_renewal | bool

- name: Build DNS SANs from inventory
  ansible.builtin.set_fact:
    monitoring_ne_dns_sans: "{{ monitoring_ne_dns_sans | default([]) + ['DNS:' + hostvars[item]['vm_hostname'] + '.' + lab_domain] }}"
  loop: "{{ groups['all'] }}"

- name: Build IP SANs from inventory
  ansible.builtin.set_fact:
    monitoring_ne_ip_sans: "{{ monitoring_ne_ip_sans | default([]) + ['IP:' + hostvars[item]['ansible_host']] }}"
  loop: "{{ groups['all'] }}"

- name: Build node-exporter server cert SANs
  ansible.builtin.set_fact:
    monitoring_ne_server_sans: >-
      {{ ['DNS:' + vm_hostname + '.' + lab_domain]
         + monitoring_ne_dns_sans
         + monitoring_ne_ip_sans }}

- name: Check if node-exporter server cert exists
  ansible.builtin.stat:
    path: "{{ node_exporter_server_cert }}"
  register: monitoring_ne_server_cert

- name: Get node-exporter server cert expiry info
  community.crypto.x509_certificate_info:
    path: "{{ node_exporter_server_cert }}"
  register: monitoring_ne_server_cert_info
  when: monitoring_ne_server_cert.stat.exists

- name: Determine if node-exporter server cert needs renewal
  ansible.builtin.set_fact:
    monitoring_ne_server_needs_renewal: >-
      {{ monitoring_ca_needs_renewal | bool
         or monitoring_cert_force_renewal | bool
         or not monitoring_ne_server_cert.stat.exists
         or (monitoring_ne_server_cert.stat.exists
             and monitoring_ne_server_cert_info.not_after is defined
             and ((monitoring_ne_server_cert_info.not_after | int - ansible_date_time.epoch | int)
                  < (monitoring_cert_renew_threshold_days * 86400))) }}

- name: Generate node-exporter server key
  community.crypto.openssl_privatekey:
    path: "{{ node_exporter_server_key }}"
    size: 4096
    mode: "0600"
  when: monitoring_ne_server_needs_renewal | bool

- name: Generate node-exporter server CSR
  community.crypto.openssl_csr:
    path: /tmp/node-exporter.csr
    privatekey_path: "{{ node_exporter_server_key }}"
    common_name: "{{ vm_hostname }}.{{ lab_domain }}"
    subject_alt_name: "{{ monitoring_ne_server_sans }}"
  when: monitoring_ne_server_needs_renewal | bool

- name: Sign node-exporter server cert with monitoring CA
  community.crypto.x509_certificate:
    path: "{{ node_exporter_server_cert }}"
    privatekey_path: "{{ node_exporter_server_key }}"
    csr_path: /tmp/node-exporter.csr
    provider: ownca
    ownca_path: "{{ monitoring_mtls_ca_cert }}"
    ownca_privatekey_path: "{{ monitoring_mtls_dir }}/ca.key"
    ownca_not_after: "+3650d"
    mode: "0644"
  when: monitoring_ne_server_needs_renewal | bool

- name: Remove node-exporter server CSR
  ansible.builtin.file:
    path: /tmp/node-exporter.csr
    state: absent
  when: monitoring_ne_server_needs_renewal | bool

- name: Check if Prometheus client cert exists
  ansible.builtin.stat:
    path: "{{ monitoring_mtls_client_cert }}"
  register: monitoring_client_cert

- name: Get Prometheus client cert expiry info
  community.crypto.x509_certificate_info:
    path: "{{ monitoring_mtls_client_cert }}"
  register: monitoring_client_cert_info
  when: monitoring_client_cert.stat.exists

- name: Determine if Prometheus client cert needs renewal
  ansible.builtin.set_fact:
    monitoring_client_needs_renewal: >-
      {{ monitoring_ca_needs_renewal | bool
         or monitoring_cert_force_renewal | bool
         or not monitoring_client_cert.stat.exists
         or (monitoring_client_cert.stat.exists
             and monitoring_client_cert_info.not_after is defined
             and ((monitoring_client_cert_info.not_after | int - ansible_date_time.epoch | int)
                  < (monitoring_cert_renew_threshold_days * 86400))) }}

- name: Generate Prometheus client key
  community.crypto.openssl_privatekey:
    path: "{{ monitoring_mtls_client_key }}"
    size: 4096
    mode: "0600"
  when: monitoring_client_needs_renewal | bool

- name: Generate Prometheus client CSR
  community.crypto.openssl_csr:
    path: /tmp/prometheus-client.csr
    privatekey_path: "{{ monitoring_mtls_client_key }}"
    common_name: "prometheus"
  when: monitoring_client_needs_renewal | bool

- name: Sign Prometheus client cert with monitoring CA
  community.crypto.x509_certificate:
    path: "{{ monitoring_mtls_client_cert }}"
    privatekey_path: "{{ monitoring_mtls_client_key }}"
    csr_path: /tmp/prometheus-client.csr
    provider: ownca
    ownca_path: "{{ monitoring_mtls_ca_cert }}"
    ownca_privatekey_path: "{{ monitoring_mtls_dir }}/ca.key"
    ownca_not_after: "+3650d"
    mode: "0644"
  when: monitoring_client_needs_renewal | bool

- name: Remove Prometheus client CSR
  ansible.builtin.file:
    path: /tmp/prometheus-client.csr
    state: absent
  when: monitoring_client_needs_renewal | bool

- name: Set mTLS client cert/key permissions for container access
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ monitoring_mtls_client_cert }}", mode: "0644" }
    - { path: "{{ monitoring_mtls_client_key }}", mode: "0644" }
    - { path: "{{ monitoring_mtls_ca_cert }}", mode: "0644" }
  notify: Restart monitoring pod

- name: Copy monitoring CA to node-exporter cert path on localhost
  ansible.builtin.copy:
    src: "{{ monitoring_mtls_ca_cert }}"
    dest: "{{ node_exporter_ca_cert }}"
    remote_src: true
    mode: "0640"
    owner: root
    group: node_exporter

- name: Read mTLS CA cert for distribution
  ansible.builtin.slurp:
    src: "{{ monitoring_mtls_ca_cert }}"
  register: monitoring_ca_cert_content

- name: Read node-exporter server cert for distribution
  ansible.builtin.slurp:
    src: "{{ node_exporter_server_cert }}"
  register: monitoring_ne_server_cert_content

- name: Read node-exporter server key for distribution
  ansible.builtin.slurp:
    src: "{{ node_exporter_server_key }}"
  register: monitoring_ne_server_key_content

- name: Distribute mTLS CA cert to all hosts
  ansible.builtin.copy:
    content: "{{ monitoring_ca_cert_content.content | b64decode }}"
    dest: "{{ node_exporter_ca_cert }}"
    owner: root
    group: node_exporter
    mode: "0640"
  delegate_to: "{{ item }}"
  loop: "{{ groups['all'] | difference([inventory_hostname]) }}"

- name: Distribute node-exporter server cert to all hosts
  ansible.builtin.copy:
    content: "{{ monitoring_ne_server_cert_content.content | b64decode }}"
    dest: "{{ node_exporter_server_cert }}"
    owner: root
    group: node_exporter
    mode: "0640"
  delegate_to: "{{ item }}"
  loop: "{{ groups['all'] | difference([inventory_hostname]) }}"

- name: Distribute node-exporter server key to all hosts
  ansible.builtin.copy:
    content: "{{ monitoring_ne_server_key_content.content | b64decode }}"
    dest: "{{ node_exporter_server_key }}"
    owner: root
    group: node_exporter
    mode: "0640"
  delegate_to: "{{ item }}"
  loop: "{{ groups['all'] | difference([inventory_hostname]) }}"

- name: Set node-exporter cert permissions on localhost
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: root
    group: node_exporter
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ node_exporter_ca_cert }}", mode: "0640" }
    - { path: "{{ node_exporter_server_cert }}", mode: "0640" }
    - { path: "{{ node_exporter_server_key }}", mode: "0640" }

- name: Restart node-exporter on localhost to pick up cert changes
  ansible.builtin.systemd:
    name: node-exporter
    state: restarted
  when: monitoring_ne_server_needs_renewal | bool

- name: Restart node-exporter on all hosts to pick up cert changes
  ansible.builtin.systemd:
    name: node-exporter
    state: restarted
  delegate_to: "{{ item }}"
  loop: "{{ groups['all'] | difference([inventory_hostname]) }}"
  when: monitoring_ne_server_needs_renewal | bool

- name: Ensure monitoring podman network exists
  containers.podman.podman_network:
    name: "{{ monitoring_network_name }}"
    state: present

- name: Render Prometheus configuration
  ansible.builtin.template:
    src: "{{ role_path }}/templates/prometheus.yml.j2"
    dest: /tmp/monitoring-prometheus.yml
    mode: "0644"

- name: Render Alertmanager configuration
  ansible.builtin.template:
    src: "{{ role_path }}/templates/alertmanager.yml.j2"
    dest: /tmp/monitoring-alertmanager.yml
    mode: "0644"

- name: Read Grafana datasources
  ansible.builtin.slurp:
    src: "{{ role_path }}/files/grafana/datasources.yml"
  register: monitoring_cm_datasources

- name: Read Grafana dashboards provider
  ansible.builtin.slurp:
    src: "{{ role_path }}/files/grafana/dashboards-provider.yml"
  register: monitoring_cm_dashboards_provider

- name: Read Prometheus rules
  ansible.builtin.slurp:
    src: "{{ role_path }}/files/prometheus/rules.yml"
  register: monitoring_cm_prometheus_rules

- name: Read rendered Prometheus config
  ansible.builtin.slurp:
    src: /tmp/monitoring-prometheus.yml
  register: monitoring_cm_prometheus

- name: Read rendered Alertmanager config
  ansible.builtin.slurp:
    src: /tmp/monitoring-alertmanager.yml
  register: monitoring_cm_alertmanager

- name: Read Grafana dashboards
  ansible.builtin.slurp:
    src: "{{ item.file }}"
  loop: "{{ monitoring_grafana_dashboards }}"
  register: monitoring_cm_dashboards

- name: Template monitoring pod manifest
  ansible.builtin.template:
    src: monitoring-pod.yml.j2
    dest: "{{ monitoring_config_dir }}/monitoring-pod.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart monitoring pod

- name: Deploy monitoring pod
  ansible.builtin.shell: |
    podman kube play --down {{ monitoring_config_dir }}/monitoring-pod.yml 2>/dev/null || true
    podman kube play --network {{ monitoring_network_name }} {{ monitoring_config_dir }}/monitoring-pod.yml
  args:
    executable: /bin/bash
  register: monitoring_deploy
  changed_when: "'Pod' in monitoring_deploy.stdout or 'Container' in monitoring_deploy.stdout"

- name: Configure SELinux booleans for monitoring
  ansible.posix.seboolean:
    name: "{{ item.name }}"
    state: "{{ item.state }}"
    persistent: true
  loop:
    - { name: httpd_can_network_connect, state: true }
    - { name: httpd_can_network_relay, state: true }
  when: ansible_selinux.status == "enabled"

- name: Install nginx
  ansible.builtin.dnf:
    name: nginx
    state: present

- name: Template nginx reverse proxy configuration
  ansible.builtin.template:
    src: nginx-reverse-proxy.conf.j2
    dest: /etc/nginx/conf.d/monitoring.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart nginx

- name: Remove default nginx server block
  ansible.builtin.file:
    path: /etc/nginx/conf.d/default.conf
    state: absent
  notify: Restart nginx

- name: Ensure nginx is started and enabled
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true
