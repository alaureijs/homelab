---
# node_exporter role defaults

# Version managed in group_vars/all/versions.yml
# node_exporter_version is set there, role inherits it
node_exporter_port: 9100
node_exporter_listen_address: "{{ ansible_host }}"
node_exporter_enabled: true
node_exporter_tls_enabled: true

# Paths
node_exporter_bin: /usr/local/bin/node_exporter
node_exporter_user: node_exporter
node_exporter_group: node_exporter

# TLS (generated by monitoring role on ansible02, distributed to all hosts)
node_exporter_cert_dir: /etc/pki/tls/certs
node_exporter_key_dir: /etc/pki/tls/private
node_exporter_ca_cert: "{{ node_exporter_cert_dir }}/monitoring-ca.crt"
node_exporter_server_cert: "{{ node_exporter_cert_dir }}/node-exporter.crt"
node_exporter_server_key: "{{ node_exporter_key_dir }}/node-exporter.key"
node_exporter_web_config: /etc/node-exporter/web-config.yml

# Textfile collector
node_exporter_textfile_dir: /var/lib/node-exporter/textfiles_metrics
node_exporter_textfile_scripts_dir: /usr/local/lib/node-exporter-textfile-scripts
node_exporter_textfile_timer_interval: 5m

node_exporter_textfile_scripts:
  - name: chrony.sh
  - name: fstab-check.sh
  - name: reboot-required.sh
  - name: authorized-keys.sh
  - name: container-health.sh
