---
dependency:
  name: galaxy

driver:
  name: podman

platforms:
  - name: node-exporter-instance
    image: localhost/rockylinux/systemd:10
    command: /usr/sbin/init
    privileged: true
    pre_build_image: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

provisioner:
  name: ansible
  env:
    ANSIBLE_COLLECTIONS_PATH: "${MOLECULE_PROJECT_DIRECTORY}/collections:/usr/lib/python3.14/site-packages"
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/../"
  inventory:
    host_vars:
      node-exporter-instance:
        node_exporter_tls_enabled: false
        node_exporter_version: "1.8.2"

verifier:
  name: ansible

scenario:
  name: default
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy
