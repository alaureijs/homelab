---
- name: Install node_exporter
  when: node_exporter_enabled | bool
  block:
    - name: Create node_exporter group
      ansible.builtin.group:
        name: "{{ node_exporter_group }}"
        system: true
        state: present

    - name: Create node_exporter user
      ansible.builtin.user:
        name: "{{ node_exporter_user }}"
        group: "{{ node_exporter_group }}"
        shell: /usr/sbin/nologin
        system: true
        create_home: false
        state: present

    - name: Include textfile collector tasks
      ansible.builtin.include_tasks: textfile.yml

    - name: Check if node_exporter is already installed
      ansible.builtin.stat:
        path: "{{ node_exporter_bin }}"
      register: node_exporter_installed

    - name: Get installed node_exporter version
      ansible.builtin.shell: "{{ node_exporter_bin }} --version 2>&1 | grep -oP '[0-9]+\\.[0-9]+\\.[0-9]+'"
      register: node_exporter_current_version
      changed_when: false
      failed_when: false
      when: node_exporter_installed.stat.exists

    - name: Set node_exporter version fact
      ansible.builtin.set_fact:
        node_exporter_version_stripped: "{{ node_exporter_version | regex_replace('^v', '') }}"

    - name: Copy node_exporter tarball to target
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/prometheus/exporters/node_exporter-{{ node_exporter_version_stripped }}.linux-amd64.tar.gz"
        dest: "/tmp/node_exporter-{{ node_exporter_version_stripped }}.tar.gz"
        mode: "0644"
      when: >-
        not node_exporter_installed.stat.exists or
        (node_exporter_current_version.stdout is defined and
         node_exporter_current_version.stdout | trim != node_exporter_version_stripped)

    - name: Extract node_exporter binary
      ansible.builtin.unarchive:
        src: "/tmp/node_exporter-{{ node_exporter_version_stripped }}.tar.gz"
        dest: /tmp/
        remote_src: true
      when: >-
        not node_exporter_installed.stat.exists or
        (node_exporter_current_version.stdout is defined and
         node_exporter_current_version.stdout | trim != node_exporter_version_stripped)

    - name: Copy node_exporter binary
      ansible.builtin.copy:
        src: "/tmp/node_exporter-{{ node_exporter_version_stripped }}.linux-amd64/node_exporter"
        dest: "{{ node_exporter_bin }}"
        owner: root
        group: root
        mode: "0755"
        remote_src: true
      when: >-
        not node_exporter_installed.stat.exists or
        (node_exporter_current_version.stdout is defined and
         node_exporter_current_version.stdout | trim != node_exporter_version_stripped)
      notify: Restart node-exporter

    - name: Cleanup tarball
      ansible.builtin.file:
        path: "/tmp/node_exporter-{{ node_exporter_version_stripped }}.tar.gz"
        state: absent

    - name: Cleanup extracted directory
      ansible.builtin.file:
        path: "/tmp/node_exporter-{{ node_exporter_version_stripped }}.linux-amd64"
        state: absent

    - name: Open node_exporter port in firewalld
      ansible.posix.firewalld:
        port: "{{ node_exporter_port }}/tcp"
        permanent: true
        state: enabled
        immediate: true
      failed_when: false

    - name: Ensure node_exporter TLS directory exists
      ansible.builtin.file:
        path: /etc/node-exporter
        state: directory
        owner: root
        group: "{{ node_exporter_group }}"
        mode: "0750"

    - name: Template node-exporter web config (TLS)
      ansible.builtin.template:
        src: node-exporter-web-config.yml.j2
        dest: "{{ node_exporter_web_config }}"
        owner: root
        group: "{{ node_exporter_group }}"
        mode: "0640"
      when: node_exporter_tls_enabled | bool
      notify: Restart node-exporter

    - name: Template node-exporter service
      ansible.builtin.template:
        src: node-exporter.service.j2
        dest: /etc/systemd/system/node-exporter.service
        owner: root
        group: root
        mode: "0644"
      notify: Restart node-exporter

    - name: Enable and start node-exporter
      ansible.builtin.systemd:
        name: node-exporter
        state: started
        enabled: true
        daemon_reload: true

- name: Disable node-exporter
  ansible.builtin.systemd:
    name: node-exporter
    state: stopped
    enabled: false
  when: not (node_exporter_enabled | bool)
