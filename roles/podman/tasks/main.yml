---
- name: Install Podman and dependencies
  ansible.builtin.dnf:
    name: "{{ podman_packages }}"
    state: present

- name: Install python3-pip
  ansible.builtin.dnf:
    name: python3-pip
    state: present

- name: Install Podman Python packages
  ansible.builtin.pip:
    name: "{{ podman_pip_packages }}"
    state: present

- name: Configure registries
  ansible.builtin.template:
    src: registries.conf.j2
    dest: /etc/containers/registries.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart podman socket

- name: Enable and start podman.socket
  ansible.builtin.systemd:
    name: podman.socket
    state: "{{ 'started' if podman_enable_socket else 'stopped' }}"
    enabled: "{{ podman_enable_socket }}"

- name: Configure SELinux booleans for Podman
  ansible.posix.seboolean:
    name: "{{ item.name }}"
    state: "{{ item.state }}"
    persistent: true
  loop:
    - { name: container_manage_cgroup, state: true }
    - { name: container_read_certs, state: true }
    - { name: container_manage_public_content, state: true }
  when: ansible_selinux.status == "enabled"
