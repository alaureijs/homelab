---
- name: Ensure prometheus exporters directory exists
  ansible.builtin.file:
    path: "{{ playbook_dir }}/../files/prometheus/exporters"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false

- name: Download Prometheus exporter tarballs
  ansible.builtin.get_url:
    url: >-
      https://github.com/{{ item.repo }}/releases/download/{{ item.version }}/{{ item.file | default(item.name ~ '-' ~ item.version ~ '.' ~ prometheus_exporters_arch ~ '.tar.gz') }}
    dest: >-
      {{ playbook_dir }}/../files/prometheus/exporters/{{ item.file | default(item.name ~ '-' ~ item.version ~ '.' ~ prometheus_exporters_arch ~ '.tar.gz') }}
    mode: "0644"
  loop: "{{ prometheus_exporters }}"
  loop_control:
    label: "{{ item.name }} {{ item.version }}"
  delegate_to: localhost
  become: false

- name: Check GitHub for latest release
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ item.repo }}/releases/latest"
    return_content: true
  register: _exporter_latest
  loop: "{{ prometheus_exporters }}"
  loop_control:
    label: "{{ item.name }}"
  failed_when: false
  delegate_to: localhost
  become: false

- name: Fallback to first release if no latest
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ item.item.repo }}/releases"
    return_content: true
  register: _exporter_releases
  loop: "{{ _exporter_latest.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: item.status == 404
  failed_when: false
  delegate_to: localhost
  become: false

- name: Build exporter report
  ansible.builtin.set_fact:
    prometheus_exporters_report: >-
      {{ prometheus_exporters_report | default({}) | combine(
          {item.name: {
            'current_version': item.version,
            'latest_version': (
              _exporter_latest.results | selectattr('item.name', 'equalto', item.name) | first
              | json_query('content.tag_name')
              | default(
                  (_exporter_releases.results | default([])
                   | selectattr('item.item.name', 'equalto', item.name) | first
                   | json_query('content[0].tag_name') | default('NONE'))
              )
            ),
            'update_available': >-
              {{ (_exporter_latest.results | selectattr('item.name', 'equalto', item.name) | first
                  | json_query('content.tag_name')
                  | default(
                      (_exporter_releases.results | default([])
                       | selectattr('item.item.name', 'equalto', item.name) | first
                       | json_query('content[0].tag_name') | default('NONE'))
                  )) != 'NONE'
                 and
                 (_exporter_latest.results | selectattr('item.name', 'equalto', item.name) | first
                  | json_query('content.tag_name')
                  | default(
                      (_exporter_releases.results | default([])
                       | selectattr('item.item.name', 'equalto', item.name) | first
                       | json_query('content[0].tag_name') | default('NONE'))
                  ) | regex_replace('^v', '')
                  != item.version | regex_replace('^v', '')) }}
          }}
      ) }}
  loop: "{{ prometheus_exporters }}"
  loop_control:
    label: "{{ item.name }}"

- name: Ensure reports directory exists
  ansible.builtin.file:
    path: "{{ playbook_dir }}/../reports"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false

- name: Write exporters report
  ansible.builtin.copy:
    content: "{{ prometheus_exporters_report | to_nice_yaml }}"
    dest: "{{ playbook_dir }}/../reports/exporters-report-{{ ansible_date_time.date }}.yml"
    mode: "0644"
  delegate_to: localhost
  become: false

- name: Display exporter summary
  ansible.builtin.debug:
    msg: |
      Prometheus Exporters Report
      ===========================
      {% for name, info in prometheus_exporters_report.items() %}
      {{ name }}:{{ info.current_version }}
        Latest: {{ info.latest_version }}
        Update: {{ 'YES (' + info.latest_version + ')' if info.update_available else 'no' }}
      {% endfor %}

      Report saved to:
        reports/exporters-report-{{ ansible_date_time.date }}.yml
