---
- name: Ensure prometheus exporters directory exists
  ansible.builtin.file:
    path: "{{ playbook_dir }}/../files/prometheus/exporters"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false

- name: Download Prometheus exporter tarballs
  ansible.builtin.get_url:
    url: >-
      https://github.com/{{ item.repo }}/releases/download/{{ item.version }}/{{ item.file | default(item.name ~ '-' ~ item.version | regex_replace('^v', '') ~ '.' ~ prometheus_exporters_arch ~ '.tar.gz') }}
    dest: >-
      {{ playbook_dir }}/../files/prometheus/exporters/{{ item.file | default(item.name ~ '-' ~ item.version | regex_replace('^v', '') ~ '.' ~ prometheus_exporters_arch ~ '.tar.gz') }}
    mode: "0644"
  loop: "{{ prometheus_exporters }}"
  loop_control:
    label: "{{ item.name }} {{ item.version }}"
  delegate_to: localhost
  become: false

- name: Check GitHub for latest version
  ansible.builtin.shell: |
    set -euo pipefail
    REPO="{{ item.repo }}"
    CURRENT="{{ item.version | regex_replace('^v', '') }}"

    LATEST=$(curl -sf "https://api.github.com/repos/$REPO/releases/latest" \
      | python3 -c "import sys,json; print(json.load(sys.stdin).get('tag_name',''))" 2>/dev/null || echo "")

    if [ -z "$LATEST" ]; then
      LATEST=$(curl -sf "https://api.github.com/repos/$REPO/releases" \
        | python3 -c "
    import sys, json
    releases = json.load(sys.stdin)
    for r in releases:
        if not r.get('prerelease', False):
            print(r.get('tag_name',''))
            break
    else:
        print('')
    " 2>/dev/null || echo "")
    fi

    STRIPPED=$(echo "$LATEST" | sed 's/^v//')

    if [ -z "$LATEST" ]; then
      echo "NONE"
    elif [ "$STRIPPED" = "$CURRENT" ]; then
      echo "$LATEST|false"
    else
      echo "$LATEST|true"
    fi
  args:
    executable: /bin/bash
  loop: "{{ prometheus_exporters }}"
  loop_control:
    label: "{{ item.name }}"
  register: _exporter_versions
  delegate_to: localhost
  become: false

- name: Build exporter report
  ansible.builtin.set_fact:
    prometheus_exporters_report: "{{ prometheus_exporters_report | default({}) | combine({item.item.name: {'current_version': item.item.version, 'latest_version': (item.stdout | default('NONE') | split('|') | first), 'update_available': (item.stdout | default('NONE') | split('|') | last | bool)}}) }}"
  loop: "{{ _exporter_versions.results }}"
  loop_control:
    label: "{{ item.item.name }}: {{ item.stdout | default('?') }}"

- name: Ensure reports directory exists
  ansible.builtin.file:
    path: "{{ playbook_dir }}/../reports"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false

- name: Write exporters report
  ansible.builtin.copy:
    content: "{{ prometheus_exporters_report | to_nice_yaml }}"
    dest: "{{ playbook_dir }}/../reports/exporters-report-{{ ansible_date_time.date }}.yml"
    mode: "0644"
  delegate_to: localhost
  become: false

- name: Display exporter summary
  ansible.builtin.debug:
    msg: |
      Prometheus Exporters Report
      ===========================
      {% for name, info in prometheus_exporters_report.items() %}
      {{ name }}:{{ info.current_version }}
        Latest: {{ info.latest_version }}
        Update: {{ 'YES (' + info.latest_version + ')' if info.update_available else 'no' }}
      {% endfor %}

      Report saved to:
        reports/exporters-report-{{ ansible_date_time.date }}.yml
